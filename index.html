<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BadgeFinder FC</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />
  <style>
    body { margin: 0; font-family: system-ui; background:#0f172a; color:white; }
    #map { height: 70vh; }
    .panel { padding: 16px; }
    button { margin:4px; padding:8px 12px; border-radius:8px; border:none; cursor:pointer; }
  </style>
</head>
<body>
  <div class="panel">
    <h1>BadgeFinder FC</h1>
    <p id="team"></p>
    <p id="feedback">Click map to guess</p>
    <button onclick="reveal()">Reveal</button>
    <button onclick="next()">Next</button>
  </div>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const TEAMS = [
      { name:"North London Cannons", lat:51.5549, lng:-0.1084 },
      { name:"Catalan Crowns", lat:41.3809, lng:2.1228 },
      { name:"Bavarian Stars", lat:48.2188, lng:11.6247 }
    ];

    let index = 0;
    let map = L.map('map').setView([20,0],2);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution:'© OpenStreetMap'
    }).addTo(map);

    let targetMarker;

    function setTeam() {
      document.getElementById('team').innerText = TEAMS[index].name;
      document.getElementById('feedback').innerText = "Click map to guess";
    }

    function distance(a,b){
      const R=6371;
      const dLat=(b.lat-a.lat)*Math.PI/180;
      const dLng=(b.lng-a.lng)*Math.PI/180;
      const lat1=a.lat*Math.PI/180;
      const lat2=b.lat*Math.PI/180;
      const x=Math.sin(dLat/2)**2+Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLng/2)**2;
      return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
    }

    map.on('click', function(e){
      const guess = { lat:e.latlng.lat, lng:e.latlng.lng };
      const d = distance(guess, TEAMS[index]);
      document.getElementById('feedback').innerText = d.toFixed(1)+" km away";

      L.marker([guess.lat, guess.lng]).addTo(map);
    });

    function reveal(){
      const t = TEAMS[index];
      targetMarker = L.marker([t.lat, t.lng]).addTo(map);
    }

    function next(){
      index = (index+1)%TEAMS.length;
      map.eachLayer(l=>{ if(l instanceof L.Marker) map.removeLayer(l); });
      setTeam();
    }

    setTeam();

    console.assert(distance({lat:0,lng:0},{lat:0,lng:0}) < 0.001, "distance self test failed");
  </script>
</body>
</html>
